<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #6b6a65; --text3: #9e9d98;
    --purple: #534AB7; --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --teal-bg: #E1F5EE; --teal-text: #0F6E56;
    --coral-bg: #FAECE7; --coral-text: #993C1D;
    --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --pink-bg: #FBEAF0; --pink-text: #993556;
    --green-bg2: #D6EDCC; --green-text2: #2A5E0A;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-light: #F7C1C1;
    --orange-bg: #FAEEDA; --orange-text: #854F0B;
    --green-bg: #EAF3DE; --green-text: #3B6D11;
    --gray-bg: #F1EFE8; --gray-text: #5F5E5A;
    --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #252522; --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.16);
      --text: #f0ede6; --text2: #9e9d98; --text3: #6b6a65;
      --purple-bg: #26215C; --purple-text: #AFA9EC;
      --teal-bg: #04342C; --teal-text: #5DCAA5;
      --coral-bg: #4A1B0C; --coral-text: #F0997B;
      --blue-bg: #042C53; --blue-text: #85B7EB;
      --amber-bg: #412402; --amber-text: #FAC775;
      --pink-bg: #4B1528; --pink-text: #ED93B1;
      --green-bg2: #0D3206; --green-text2: #7EC85A;
      --red-bg: #501313; --red-light: #791F1F;
      --orange-bg: #412402; --orange-text: #FAC775;
      --green-bg: #173404; --green-text: #97C459;
      --gray-bg: #2C2C2A; --gray-text: #B4B2A9;
    }
  }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 2px; }
  .date-label { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }

<body>
<div id="login-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:380px;margin:1rem;">

<div id="main-app">
<div class="container">

    <div class="date-label" id="date-label"></div>

    <button onclick="showMyId()" style="background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;">🔑 我的 ID</button>
    <button onclick="switchUser()" style="background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;">切換使用者</button>

  </div>
  <!-- ID modal -->
  <div id="id-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:998;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:360px;margin:1rem;">
      <div style="font-size:15px;font-weight:600;margin-bottom:8px;">🔑 我的 ID</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">把這組 ID 存起來，換裝置時輸入即可同步資料。</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="my-id-display" readonly style="flex:1;height:36px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:0 10px;font-size:12px;font-family:monospace;background:var(--surface2);color:var(--text);outline:none;" />
        <button onclick="copyMyId()" id="copy-btn" style="height:36px;padding:0 14px;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;">複製</button>
      </div>
      <button onclick="closeMyId()" style="margin-top:12px;width:100%;height:34px;background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;">關閉</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">全部任務</div></div>
    <div class="stat"><div class="stat-num" id="s-urgent" style="color:var(--red)">—</div><div class="stat-lbl">急迫（≤3天）</div></div>
    <div class="stat"><div class="stat-num" id="s-done" style="color:var(--green-text)">—</div><div class="stat-lbl">已完成</div></div>
  </div>
  <div class="form-card">
    <div class="form-row" style="margin-bottom:8px">
      <div class="field" style="grid-column:1/3">
        <label>任務名稱</label>
        <input type="text" id="inp-name" placeholder="例：微積分第三次作業" />
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>截止日期</label>
        <input type="datetime-local" id="inp-date" />
      </div>
      <div class="field" id="subject-field">
        <label>科目（可自由輸入）</label>
        <input type="text" id="inp-subject" placeholder="例：線性代數" autocomplete="off"
          oninput="onSubjectInput()" onfocus="onSubjectInput()" onblur="hideSuggestions()" onkeydown="onSubjectKey(event)" />
        <div class="suggestions" id="suggestions" style="display:none"></div>
      </div>
    </div>
    <div class="form-row-3">
      <div class="field" style="grid-column:1/3">
        <label>備註（可選）</label>
        <input type="text" id="inp-note" placeholder="例：需要交 PDF" />

      <button class="btn" id="add-btn" onclick="addTask()">＋ 新增</button>
    </div>
  </div>
  <div class="views">
    <button class="view-btn active" onclick="switchView('list',this)">清單</button>
    <button class="view-btn" onclick="switchView('timeline',this)">時間軸</button>
  </div>
  <div id="view-list"><div class="loading">載入中...</div></div>
  <div id="view-timeline" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://nnaiudljfhyuqosedamp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5uYWl1ZGxqZmh5dXFvc2VkYW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODA3NTYsImV4cCI6MjA5NTU1Njc1Nn0.ew2F2LSfVNWWvLTPNlUUrXkBKiA9VC9WWVl2_mRaf0U';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// Color palettes for tags — assigned by hashing subject name
const PALETTES=[
  {bg:'#EEEDFE',text:'#3C3489'},
  {bg:'#E1F5EE',text:'#0F6E56'},
  {bg:'#FAECE7',text:'#993C1D'},
  {bg:'#E6F1FB',text:'#185FA5'},
  {bg:'#FAEEDA',text:'#854F0B'},
  {bg:'#FBEAF0',text:'#993556'},
  {bg:'#D6EDCC',text:'#2A5E0A'},
  {bg:'#FDE8F5',text:'#7A1A5B'},
];
const PALETTES_DARK=[
  {bg:'#26215C',text:'#AFA9EC'},
  {bg:'#04342C',text:'#5DCAA5'},
  {bg:'#4A1B0C',text:'#F0997B'},
  {bg:'#042C53',text:'#85B7EB'},
  {bg:'#412402',text:'#FAC775'},
  {bg:'#4B1528',text:'#ED93B1'},
  {bg:'#0D3206',text:'#7EC85A'},
  {bg:'#3D0A2A',text:'#E896CC'},
];
function isDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;}
function paletteFor(subject){
  let h=0;for(let i=0;i<subject.length;i++)h=(h*31+subject.charCodeAt(i))>>>0;
  const pal=isDark()?PALETTES_DARK:PALETTES;
  return pal[h%pal.length];
}

let tasks=[], currentView='list', suggestIdx=-1;

// --- ID 管理 ---
let USER_ID = localStorage.getItem('todo_user_id') || null;

function showLoginScreen(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
}
function hideLoginScreen(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
}
function generateId(){
  const id = crypto.randomUUID();
  document.getElementById('id-input').value = id;
  document.getElementById('id-hint').textContent = '✓ 已產生新 ID，請務必記下來！';
  document.getElementById('id-hint').style.color = '#3B6D11';
}
function confirmId(){
  const val = document.getElementById('id-input').value.trim();
  if(!val){ document.getElementById('id-hint').textContent='請輸入或產生一個 ID'; document.getElementById('id-hint').style.color='#A32D2D'; return; }
  USER_ID = val;
  localStorage.setItem('todo_user_id', val);
  hideLoginScreen();
  loadTasks();
}

function knownSubjects(){
  const s=new Set(tasks.map(t=>t.tag).filter(Boolean));
  return [...s].sort();
}

function onSubjectInput(){
  const val=document.getElementById('inp-subject').value.trim().toLowerCase();
  const all=knownSubjects();
  const matches=val?all.filter(s=>s.toLowerCase().includes(val)&&s.toLowerCase()!==val):all;
  renderSuggestions(matches, val);
}
function renderSuggestions(matches, val){
  const box=document.getElementById('suggestions');
  if(!matches.length){box.style.display='none';return;}
  suggestIdx=-1;
  box.innerHTML=matches.map((s,i)=>{
    const p=paletteFor(s);
    return'<div class="suggestion-item" data-val="'+esc(s)+'" onmousedown="pickSuggestion(\''+esc(s)+'\')">'
      +'<span class="tag" style="background:'+p.bg+';color:'+p.text+'">'+esc(s)+'</span></div>';
  }).join('');
  box.style.display='block';
}
function pickSuggestion(val){
  document.getElementById('inp-subject').value=val;
  hideSuggestions();
}
function hideSuggestions(){setTimeout(()=>{document.getElementById('suggestions').style.display='none';},150);}
function onSubjectKey(e){
  const box=document.getElementById('suggestions');
  const items=box.querySelectorAll('.suggestion-item');
  if(e.key==='ArrowDown'){e.preventDefault();suggestIdx=Math.min(suggestIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===suggestIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();suggestIdx=Math.max(suggestIdx-1,0);items.forEach((el,i)=>el.classList.toggle('active',i===suggestIdx));}
  else if(e.key==='Enter'&&suggestIdx>=0){e.preventDefault();pickSuggestion(items[suggestIdx].dataset.val);}
  else if(e.key==='Escape'){hideSuggestions();}
}

function daysLeft(dl){const s=String(dl).replace('Z','').replace('+00:00','');return(new Date(s)-new Date())/86400000;}
function statusOf(t){
  if(t.done)return{cls:'badge-done',label:'已完成'};
  const d=daysLeft(t.deadline);
  if(d<0)return{cls:'badge-overdue',label:'已逾期'};
  if(d<1)return{cls:'badge-urgent',label:'今天到期'};
  if(d<=3)return{cls:'badge-urgent',label:Math.ceil(d)+' 天後'};
  if(d<=7)return{cls:'badge-soon',label:Math.ceil(d)+' 天後'};
  return{cls:'badge-ok',label:Math.ceil(d)+' 天後'};
}
function pColor(d){if(d<0)return'#E24B4A';if(d<=3)return'#EF9F27';if(d<=7)return'#97C459';return'#5DCAA5';}
function fmtDate(dl){const s=String(dl).replace('Z','').replace('+00:00','');return new Date(s).toLocaleString('zh-TW',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

async function loadTasks(){
  const{data,error}=await sb.from('tasks').select('*').eq('user_id',USER_ID).order('deadline',{ascending:true});
  if(error){showToast('載入失敗：'+error.message);return;}
  tasks=data||[];render();
}
async function addTask(){
  const name=document.getElementById('inp-name').value.trim();
  const deadline=document.getElementById('inp-date').value;
  const tag=document.getElementById('inp-subject').value.trim()||'其他';
  const note=document.getElementById('inp-note').value.trim();
  if(!name||!deadline){showToast('請填寫名稱和截止日期');return;}
  const btn=document.getElementById('add-btn');btn.disabled=true;
  const{data,error}=await sb.from('tasks').insert([{name,deadline,tag,note,done:false,user_id:USER_ID}]).select().single();
  btn.disabled=false;
  if(error){showToast('新增失敗：'+error.message);return;}
  tasks.push(data);tasks.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  document.getElementById('inp-name').value='';
  document.getElementById('inp-note').value='';
  showToast('已新增！');render();
}
async function toggleDone(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const{error}=await sb.from('tasks').update({done:!t.done}).eq('id',id);
  if(error){showToast('更新失敗');return;}
  t.done=!t.done;render();
}
async function delTask(id){
  if(!confirm('確定刪除這個任務？'))return;
  const{error}=await sb.from('tasks').delete().eq('id',id);
  if(error){showToast('刪除失敗');return;}
  tasks=tasks.filter(t=>t.id!==id);showToast('已刪除');render();
}
function tagHTML(subject){
  const p=paletteFor(subject||'其他');
  return'<span class="tag" style="background:'+p.bg+';color:'+p.text+'">'+esc(subject||'其他')+'</span>';
}
function cardHTML(t){
  const st=statusOf(t),d=daysLeft(t.deadline);
  const pct=t.done?100:Math.round(Math.max(5,Math.min(100,((14-d)/14)*100)));
  const color=t.done?'#B4B2A9':pColor(d);
  return'<div class="task-card '+(t.done?'done-card':'')+'">'+
    '<button class="check-btn '+(t.done?'checked':'')+'\" onclick="toggleDone(\''+t.id+'\')">'+(t.done?'✓':'')+'</button>'+
    '<div class="task-main">'+
    '<div class="task-name '+(t.done?'strikethrough':'')+'">'+esc(t.name)+'</div>'+
    '<div class="task-meta">'+tagHTML(t.tag)+
    '<span>📅 '+fmtDate(t.deadline)+'</span>'+(t.note?'<span>· '+esc(t.note)+'</span>':'')+'</div></div>'+
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">'+
    '<span class="badge '+st.cls+'">'+st.label+'</span>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>'+
    '<button class="del-btn" onclick="delTask(\''+t.id+'\')" title="刪除">✕</button></div>';
}
function render(){
  const total=tasks.length,urgent=tasks.filter(t=>!t.done&&daysLeft(t.deadline)<=3).length,done=tasks.filter(t=>t.done).length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-urgent').textContent=urgent;
  document.getElementById('s-done').textContent=done;
  const sorted=[...tasks].sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return new Date(a.deadline)-new Date(b.deadline);});
  if(currentView==='list'){
    const el=document.getElementById('view-list');
    el.innerHTML=sorted.length?'<div class="task-list">'+sorted.map(cardHTML).join('')+'</div>':'<div class="empty">還沒有任務，新增第一個吧！</div>';
  }
  if(currentView==='timeline'){
    const groups=[
      {label:'已逾期',color:'#A32D2D',items:[]},{label:'今天',color:'#E24B4A',items:[]},
      {label:'3 天內',color:'#854F0B',items:[]},{label:'一週內',color:'#3B6D11',items:[]},
      {label:'更後面',color:'#185FA5',items:[]},{label:'已完成',color:'#5F5E5A',items:[]}
    ];
    tasks.forEach(t=>{
      if(t.done){groups[5].items.push(t);return;}
      const d=daysLeft(t.deadline);
      if(d<0)groups[0].items.push(t);else if(d<1)groups[1].items.push(t);
      else if(d<=3)groups[2].items.push(t);else if(d<=7)groups[3].items.push(t);else groups[4].items.push(t);
    });
    groups.forEach(g=>g.items.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)));
    const el=document.getElementById('view-timeline');
    let html='';
    groups.forEach(g=>{if(!g.items.length)return;html+='<div class="tl-group"><div class="tl-label" style="color:'+g.color+'">'+g.label+'（'+g.items.length+'）</div><div class="task-list">'+g.items.map(cardHTML).join('')+'</div></div>';});
    el.innerHTML=html||'<div class="empty">還沒有任務</div>';
  }
}
function switchView(v,btn){
  currentView=v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('view-list').style.display=v==='list'?'':'none';
  document.getElementById('view-timeline').style.display=v==='timeline'?'':'none';
  render();
}
const now=new Date();
document.getElementById('date-label').textContent=now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
const def=new Date();def.setDate(def.getDate()+3);def.setHours(23,59,0,0);
document.getElementById('inp-date').value=def.toISOString().slice(0,16);
function showMyId(){
  document.getElementById('my-id-display').value = USER_ID || '';
  document.getElementById('id-modal').style.display='flex';
}
function closeMyId(){
  document.getElementById('id-modal').style.display='none';
}
function copyMyId(){
  const input = document.getElementById('my-id-display');
  input.select();
  navigator.clipboard.writeText(input.value).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent='已複製！'; btn.style.background='#3B6D11';
    setTimeout(()=>{ btn.textContent='複製'; btn.style.background=''; }, 2000);
  });
}
// close modal on backdrop click
document.getElementById('id-modal').addEventListener('click', function(e){ if(e.target===this) closeMyId(); });

function switchUser(){
  if(!confirm('確定要切換使用者？\n切換後需要輸入另一組 ID 才能進入。')) return;
  localStorage.removeItem('todo_user_id');
  USER_ID = null;
  tasks = [];
  // reset id input
  document.getElementById('id-input').value = '';
  document.getElementById('id-hint').textContent = '';
  showLoginScreen();
}

if(USER_ID){ hideLoginScreen(); loadTasks(); } else { showLoginScreen(); }
